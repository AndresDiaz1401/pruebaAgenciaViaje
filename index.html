<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>Prueba</title>
</head>

<body>
  <div class="displayContainer">
    <img src="./assets/avion.png" class="avion" alt="Avion">
    <div class="containerLeft">
      <img class="logo" src="./assets/logo.svg" alt="Logo">
      <p> Aprovecha nuestros grandes descuentos </p>
      <h1>Escápate a Europa desde <span class="precio">$250.000cop</span> ida y vuelta</h1>
      <div class="containerCards">
        <div class="card">
          <span class="item"></span>
          <p>Equipaje de mano incluido</p>
        </div>
        <div class="card">
          <span class="item"></span>
          <p>Asistencia 24/7 en destino</p>
        </div>
        <div class="card">
          <span class="item"></span>
          <p>Check-in prioritario incluido</p>
        </div>
      </div>
    </div>

    <section class="containerRight">
      <div class="card">
        <p>Oferta flash * ultimos tickets</p>
      </div>

      <div class="card containerButton">
        <div class="infoPrecio">
          <p>Desde</p>
          <span class="precio">$250.000 COP</span>
        </div>
        <button class="botonReserva">
          RESERVA AHORA
        </button>
        <small>Bloquea el precio hoy, decide la fecha después.</small>
      </div>

    </section>
    </h1>
  </div>
</body>

</html>
